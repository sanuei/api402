name = "api-market-x402"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
build = { command = "npm run build:static", watch_dir = ["src", "worker", "index.html"] }

assets = { directory = "dist", binding = "ASSETS", not_found_handling = "single-page-application" }

routes = [
  { pattern = "api-402.com/*", zone_name = "api-402.com" }
]

[[durable_objects.bindings]]
name = "REPLAY_GUARD"
class_name = "ReplayGuardDurableObject"

[[durable_objects.bindings]]
name = "METRICS_STORE"
class_name = "MetricsStoreDurableObject"

[vars]
APP_NAME = "API Market"
PAY_TO = "0x0A5312e03C1fb2b64569fAF61aD2c6517cCB0D18"
BASE_RPC_URL = "https://mainnet.base.org"
BASE_RPC_URLS = "https://mainnet.base.org,https://base.llamarpc.com"
PAYMENT_MIN_CONFIRMATIONS = "2"
PAYMENT_MAX_AGE_SECONDS = "900"
PAYMENT_MAX_FUTURE_SKEW_SECONDS = "120"
PAYMENT_MAX_SETTLEMENT_AGE_BLOCKS = "7200"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ReplayGuardDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MetricsStoreDurableObject"]
