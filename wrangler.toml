name = "api-market-x402"
main = "worker/index.ts"
compatibility_date = "2024-12-01"
build = { command = "npm run build:static", watch_dir = ["src", "worker", "index.html"] }

assets = { directory = "dist", binding = "ASSETS", not_found_handling = "single-page-application" }

routes = [
  { pattern = "api-402.com/*", zone_name = "api-402.com" }
]

[vars]
APP_NAME = "API Market"
PAY_TO = "0x0A5312e03C1fb2b64569fAF61aD2c6517cCB0D18"
BASE_RPC_URL = "https://mainnet.base.org"
