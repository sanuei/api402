<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API 402 Logo Concepts</title>
    <style>
      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        background: #05070b;
        color: #e7edf4;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      .grid {
        display: grid;
        gap: 24px;
      }
      .card {
        background: linear-gradient(180deg, rgba(9, 13, 19, 0.95), rgba(7, 10, 15, 0.95));
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 24px;
      }
      img {
        width: 100%;
        border-radius: 20px;
        display: block;
      }
      .label {
        margin: 0 0 14px;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #8b97a7;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 40px;
      }
      p {
        color: #8b97a7;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="label">Logo Concepts</p>
      <h1>API 402 Brand Explorations</h1>
      <p>Three SVG directions for a more professional, product-grade identity.</p>
      <div class="grid">
        <div class="card">
          <p class="label">Concept 01 · Orbit</p>
          <img src="./logo-concept-01-orbit.svg" alt="API 402 logo concept orbit" />
        </div>
        <div class="card">
          <p class="label">Concept 02 · Grid</p>
          <img src="./logo-concept-02-grid.svg" alt="API 402 logo concept grid" />
        </div>
        <div class="card">
          <p class="label">Concept 03 · Signal</p>
          <img src="./logo-concept-03-signal.svg" alt="API 402 logo concept signal" />
        </div>
      </div>
    </div>
  </body>
</html>
